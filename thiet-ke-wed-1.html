<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Personal Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #2d3436;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--accent);
            padding: 40px 0;
        }

        .bento-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            height: 100%;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .bento-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            background: #f1f3f5;
            color: var(--accent);
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: var(--accent);
            color: white;
        }

        .skill-tag {
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.9rem;
            margin: 5px;
            display: inline-block;
        }

        .gradient-text {
            background: linear-gradient(45deg, #00b894, #0984e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row g-4">
        
        <div class="col-lg-4">
            <div class="bento-card text-center">
                <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="profile-img mx-auto shadow-sm">
                <h2 class="fw-bold">Trần Đồng Hữu Lộc</h2>
                <p class="text-muted"></p>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <a href="#" class="social-btn"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="social-btn"><i class="bi bi-github"></i></a>
                    <a href="#" class="social-btn"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="row g-4">
                <div class="col-md-12">
                    <div class="bento-card">
                        <h4 class="fw-bold">Xin chào! 👋</h4>
                        <p class="mb-0">Tôi là sinh viên ngành CNTT tại Đại Học Trà Vinh.</p>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="bento-card">
                        <h5 class="fw-bold mb-3">Kỹ năng chuyên môn</h5>
                        <div>
                            <span class="skill-tag">HTML/CSS</span>
                            <span class="skill-tag">Bootstrap 5</span>
                            <span class="skill-tag">React.js</span>
                            <span class="skill-tag">Node.js</span>
                            <span class="skill-tag">SQL</span>
                            <span class="skill-tag">UI/UX</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-12">
                    <div class="bento-card flex-row align-items-center justify-content-between">
                        <div>
                            <span class="badge bg-success mb-2">Đang tìm dự án mới</span>
                            <h5 class="m-0">Sẵn sàng hợp tác cùng bạn!</h5>
                        </div>
                        <a href="mailto:email@example.com" class="btn btn-dark rounded-pill px-4">Liên hệ ngay</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center mt-5 text-muted">
        <small>Cảm Ơn Đã Đến !</small>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
