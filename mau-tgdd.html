
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao diện tham khảo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Tùy chỉnh màu nền chủ đạo giống Thế Giới Di Động */
        .bg-brand-yellow {
            background-color: #ffd400;
        }
        
        .navbar-brand {
            font-weight: 900;
            font-size: 1.5rem;
        }

        /* Tùy chỉnh thanh tìm kiếm */
        .search-bar {
            width: 100%;
            max-width: 400px;
        }

        /* Tùy chỉnh menu danh mục bên dưới */
        .category-menu {
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: nowrap;
        }
        
        .category-item {
            color: #000;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            padding: 5px 10px;
            transition: 0.2s;
        }

        .category-item:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        .category-item i {
            font-size: 1.2rem;
            margin-bottom: 3px;
            display: block;
        }

        /* Tùy chỉnh các nút tag tìm kiếm */
        .search-tag {
            color: #333;
            background-color: #fff;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .search-tag:hover {
            border-color: #288ad6;
            color: #288ad6;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">

    <header class="bg-brand-yellow pb-2">
        <div class="container py-2">
            <div class="row align-items-center">
                <div class="col-auto">
                    <a class="navbar-brand text-dark text-decoration-none" href="#">
                        <i class="fa-solid fa-mobile-screen-button"></i> thegioididong<span class="fs-6">.com</span>
                    </a>
                </div>
                
                <div class="col d-flex justify-content-center">
                    <div class="input-group search-bar">
                        <input type="text" class="form-control border-0 rounded-start-pill px-3" placeholder="Bạn tìm gì...">
                        <button class="btn bg-white border-0 rounded-end-pill" type="button">
                            <i class="fa-solid fa-magnifying-glass text-muted"></i>
                        </button>
                    </div>
                </div>

                <div class="col-auto d-flex align-items-center gap-3">
<a href="#" class="text-dark text-decoration-none small d-flex align-items-center gap-1">
                        <i class="fa-regular fa-user"></i> Đăng nhập
                    </a>
                    <a href="#" class="text-dark text-decoration-none small d-flex align-items-center gap-1">
                        <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng
                    </a>
                    <a href="#" class="text-dark text-decoration-none small d-flex align-items-center gap-1">
                        <i class="fa-solid fa-location-dot"></i> Hồ Chí Minh
                    </a>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="d-flex justify-content-between category-menu pb-1">
                <a href="#" class="category-item"><i class="fa-solid fa-mobile-screen-button"></i></i> Điện thoại</a>
                <a href="#" class="category-item"><i class="fa-solid fa-laptop"></i> Laptop</a>
                <a href="#" class="category-item"><i class="fa-solid fa-headphones"></i> Phụ kiện <i class="fa-solid fa-caret-down small"></i></a>
                <a href="#" class="category-item"><i class="fa-regular fa-clock"></i> Smartwatch</a>
                <a href="#" class="category-item"><i class="fa-solid fa-stopwatch"></i> Đồng hồ</a>
                <a href="#" class="category-item"><i class="fa-solid fa-tablet-screen-button"></i> Tablet <i class="fa-solid fa-caret-down small"></i></a>
                <a href="#" class="category-item"><i class="fa-solid fa-recycle"></i> Máy cũ, Thu cũ <i class="fa-solid fa-caret-down small"></i></a>
                <a href="#" class="category-item"><i class="fa-solid fa-desktop"></i> Màn hình, Máy in <i class="fa-solid fa-caret-down small"></i></a>
            </div>
        </div>
    </header>

    <main class="container my-5 bg-white p-4 rounded shadow-sm">
        
        <section>
            <h2 class="h5 fw-bold mb-3 text-uppercase text-dark">Mọi người cũng tìm kiếm</h2>
            <div class="d-flex flex-wrap gap-2">
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">laptop</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">tai nghe</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">đồng hồ</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">pc</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">macbook</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">dell</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">asus</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">điện thoại xiaomi</a>
<a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">iphone 16</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">samsung galaxy s26</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">loa marshall</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">chuột gaming</a>
                <a href="#" class="text-decoration-none search-tag rounded-pill px-3 py-1">máy lọc nước</a>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
